name: Run Barnacle Engine

on:
  workflow_dispatch: # This lets you run it manually with a button click!
  schedule:
    - cron: '0 0 * * 1' # This runs it automatically every Monday at midnight

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Barnacle Engine
      run: python barnacle_engine.py

    - name: Commit and push changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add KNOWLEDGE_MAP.md
        git commit -m "Auto-update Knowledge Map" || echo "No changes to commit"
        git push
        
